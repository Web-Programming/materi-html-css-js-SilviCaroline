<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoyCakery 🍰</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink-main:#ffe4ec;
            --pink-soft:#fff0f6;
            --pink-dark:#ff6f91;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:var(--pink-soft);
            overflow-x:hidden;
        }

        /* NAVBAR */
        .navbar{
            background:var(--pink-main);
            box-shadow:0 5px 15px rgba(255,182,193,0.4);
        }

        .navbar-brand{
            font-family:'Montserrat',sans-serif;
            font-weight:700;
            display:flex;
            align-items:center;
        }

        /* LOOPY LOGO */
        .navbar-brand img{
            width:45px;
            border-radius:50%;
            margin-right:8px;
            box-shadow:0 4px 10px rgba(255,105,180,0.4);
            animation: wiggle 3s infinite;
            transition:0.3s;
        }

        .navbar-brand img:hover{
            transform:scale(1.15) rotate(5deg);
        }

        @keyframes wiggle{
            0%,100%{transform:rotate(0);}
            50%{transform:rotate(5deg);}
        }

        .nav-link{
            color:white !important;
            font-weight:500;
        }

        /* HERO */
        .hero{
            text-align:center;
            padding:60px 20px;
        }

        .hero h1{
            font-family:'Montserrat',sans-serif;
            color:var(--pink-dark);
        }

        /* CARD */
        .cake-card{
            border-radius:20px;
            background:white;
            box-shadow:0 10px 20px rgba(255,182,193,0.4);
            transition:.3s;
            padding:15px;
        }

        .cake-card:hover{
            transform:translateY(-10px);
        }

        /* BUTTON */
        .btn-cute{
            background:var(--pink-dark);
            color:white;
            border:none;
            border-radius:30px;
        }

        .btn-cute:hover{
            background:#ff4d79;
            transform:scale(1.05);
        }

        /* SAKURA */
        .falling{
            position:fixed;
            top:-50px;
            animation:fall linear infinite;
        }

        @keyframes fall{
            to{ transform:translateY(100vh);}
        }

        /* FLOAT CAKE */
        .floating{
            position:fixed;
            width:50px;
            animation:float 6s infinite ease-in-out;
        }

        @keyframes float{
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-20px);}
        }

        footer{
            background:var(--pink-main);
            color:white;
        }
    </style>
</head>

<body>

<!-- FLOATING CAKE -->
<img src="https://cdn-icons-png.flaticon.com/512/685/685352.png" class="floating" style="left:5%;top:25%;">
<img src="https://cdn-icons-png.flaticon.com/512/685/685352.png" class="floating" style="right:5%;top:45%;">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg py-2">
    <div class="container">

        <!-- LOOPY LOGO -->
        <a class="navbar-brand text-white">
            <img src="https://i.pinimg.com/originals/8f/6b/4f/8f6b4f9a0b7c7c9d7b1e5c6f3f2b8c7f.png">
            PoyCakery
        </a>

        <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
            ☰
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="menu">
            <ul class="navbar-nav">
                <li class="nav-item"><a href="#" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
            </ul>
        </div>

    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Welcome to PoyCakery 💗</h1>
    <p>Cake lucu & aesthetic ala Korean cafe 🍓</p>
</section>

<!-- PRODUK -->
<div class="container py-5">
    <div class="row g-4" id="product-container"></div>
</div>

<!-- FOOTER -->
<footer class="text-center p-4">
    <p>© 2026 PoyCakery 💖</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* SAKURA */
setInterval(()=>{
let el=document.createElement("div");
el.innerHTML="🌸";
el.className="falling";
el.style.left=Math.random()*window.innerWidth+"px";
el.style.animationDuration=(Math.random()*3+2)+"s";
el.style.fontSize=(Math.random()*10+15)+"px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),5000);
},300);

/* DATA PRODUK */
const products=[
{nama:"Strawberry Cake 🍓",harga:120000,gambar:"https://picsum.photos/300?1"},
{nama:"Chocolate Cake 🍫",harga:140000,gambar:"https://picsum.photos/300?2"},
{nama:"Vanilla Cake 🍰",harga:100000,gambar:"https://picsum.photos/300?3"}
];

/* RENDER */
const container=document.getElementById("product-container");

products.forEach(p=>{
container.innerHTML+=`
<div class="col-md-4">
<div class="card cake-card text-center">
<img src="${p.gambar}" class="img-fluid rounded">
<h5 class="mt-3">${p.nama}</h5>
<p>Rp ${p.harga.toLocaleString()}</p>
<button class="btn btn-cute">Order 💖</button>
</div>
</div>`;
});
</script>

</body>
</html>
